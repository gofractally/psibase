# Ralph configuration for psibase development
# Key=value format; comments and blank lines are ignored.

# Maximum loop iterations per run. Loop exits when reached even if stories remain.
MAX_ITERATIONS=10

# How many user stories to complete before stopping. Useful for incremental runs.
STORIES_PER_RUN=1

# Model to pass to cursor-agent. Examples: auto, sonnet-4, opus-4.5
MODEL=auto

# Max retries per subtask before writing escalation report and exiting.
MAX_TASK_ATTEMPTS=3

# Workspace root (psibase repo). All paths are relative to this.
WORKSPACE=/home/mike/repos/fractally/psibase

# Build directory relative to workspace. Used for build verification.
BUILD_DIR=build

# Skills directory (reference docs injected into each prompt). Leave empty to use WORKSPACE/ai/skills.
# SKILLS_DIR=
