[workspace]
resolver = "2"
members = [
    "XPSlack",
    "XPSlack/service",
]

[workspace.package]
version = "0.23.0"
rust-version = "1.64"
edition = "2021"
repository = "https://github.com/gofractally/psibase"
homepage = "https://psibase.io"
license = "MIT"
publish = false

[workspace.dependencies]
psibase = { path = "../../rust/psibase", version = "0.23.0" }
psibase_macros = { path = "../../rust/psibase_macros", version = "0.23.0" }
psibase_service = { path = "../../rust/psibase_service", version = "0.23.0" }
serde = { version = "1.0.208", features = ["derive"] }
serde_json = "1.0.120"

[profile.release]
codegen-units = 1
opt-level = "s"
debug = false
strip = true
lto = true
