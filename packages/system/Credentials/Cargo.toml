[package]
name = "credentials-pkg"
description = "Manages credentials and signing with credentials"
version.workspace = true
rust-version.workspace = true
edition.workspace = true
repository.workspace = true
homepage.workspace = true
publish.workspace = true

[package.metadata.psibase]
package-name = "Credentials"
services = ["credentials"]

[package.metadata.psibase.dependencies]
Sites = "0.23.0"
Accounts = "0.23.0"
AccountsService = "0.23.0"
Base64 = "0.23.0"
Host = "0.23.0"
Tokens = "0.23.0"
Transact = "0.23.0"
VirtualServer = "0.23.0"

[lib]
crate-type = ["rlib"]

[dependencies]
credentials = { path = "service", version = "0.23.0" }
credentials-plugin = { path = "plugin", version = "0.23.0" }
psibase-system-workspace-hack.workspace = true

