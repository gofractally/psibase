[package]
name = "evaluations-pkg"                                                                                          # Crate name
description = "Facilitates the discovery of one or more groups' rank-ordered preferences over a list of elements"
version.workspace = true
rust-version.workspace = true
edition.workspace = true
repository.workspace = true
homepage.workspace = true
publish.workspace = true

[package.metadata.psibase]
package-name = "Evaluations"
services = ["evaluations"]

[package.metadata.psibase.dependencies]
Accounts = "0.23.0"
Aes = "0.23.0"
Base64 = "0.23.0"
Host = "0.23.0"
HttpServer = "0.23.0"
Sites = "0.23.0"
Transact = "0.23.0"

[lib]
crate-type = ["rlib"]

[dependencies]
evaluations = { path = "service", version = "0.23.0" }
r-evaluations = { path = "query-service", version = "0.23.0" }
evaluations-plugin = { path = "plugin", version = "0.23.0" }
psibase-user-workspace-hack.workspace = true
