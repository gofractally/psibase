[package]
name = "fractal-gen-pkg"
description = "System fractal generator. If a network is using fractal governance, this should be installed at boot."
version.workspace = true
edition.workspace = true
repository.workspace = true
homepage.workspace = true
rust-version.workspace = true
publish.workspace = true

[package.metadata.psibase]
package-name = "FractalGen"
services = ["fractal-gen"]

[package.metadata.psibase.dependencies]
Sites = "0.23.0"
HttpServer = "0.23.0"

[lib]
crate-type = ["rlib"]

[dependencies]
fractal-gen = { path = "service", version = "0.23.0" }
psibase-user-workspace-hack.workspace = true
