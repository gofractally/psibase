psibase_service.workspace = true
psibase-user-workspace-hack.workspace = true
serde.workspace = true

[package.metadata.psibase.dependencies]
Sites = "0.23.0"
HttpServer = "0.23.0"
Tokens = "0.23.0"
Symbol = "0.23.0"
Transact = "0.23.0"
Nft = "0.23.0"
VirtualServer = "0.23.0"
Fractals = "0.23.0"
Accounts = "0.23.0"
Producers = "0.23.0"

[dev-dependencies]
frac-tester-pkg = { path = "..", version = "0.23.0" }
