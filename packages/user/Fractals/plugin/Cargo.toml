[package]
name = "fractals-plugin"
version.workspace = true
rust-version.workspace = true
edition.workspace = true
publish.workspace = true

[dependencies]
fractals = { path = "../service/", version = "0.23.0" }
psibase.workspace = true
psibase_plugin.workspace = true
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
wit-bindgen-rt.workspace = true
psibase-user-workspace-hack.workspace = true

[lib]
crate-type = ["cdylib"]

[package.metadata.component]
package = "fractals:plugin"

[package.metadata.component.target]
world = "impl"

[package.metadata.component.bindings.with]
"host:types/types" = "psibase_plugin::types"

[package.metadata.component.target.dependencies]
"host:types" = { path = "../../Host/plugin/types/wit/world.wit" }
"transact:plugin" = { path = "../../../system/Transact/plugin/wit/world.wit" }
"sites:plugin" = { path = "../../Sites/plugin/wit/world.wit" }
"guilds:plugin" = { path = "../../Guilds/plugin/wit/world.wit" }
"accounts:plugin" = { path = "../../../system/Accounts/plugin/accounts/wit/world.wit" }
"base64:plugin" = { path = "../../Base64/plugin/wit/world.wit" }


[dev-dependencies]
fractals-pkg = { path = "..", version = "0.23.0" }
