[package]
name = "guilds-plugin"
version.workspace = true
rust-version.workspace = true
edition.workspace = true
publish.workspace = true

[dependencies]
guilds = { path = "../service/", version = "0.23.0" }
psibase.workspace = true
psibase_plugin.workspace = true
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
wit-bindgen-rt.workspace = true
psibase-user-workspace-hack.workspace = true

[lib]
crate-type = ["cdylib"]

[package.metadata.component]
package = "guilds:plugin"

[package.metadata.component.target]
world = "impl"

[package.metadata.component.bindings.with]
"host:types/types" = "psibase_plugin::types"

[package.metadata.component.target.dependencies]
"host:common" = { path = "../../Host/plugin/common/wit/world.wit" }
"host:types" = { path = "../../Host/plugin/types/wit/world.wit" }
"permissions:plugin" = { path = "../../Permissions/plugin/wit/world.wit" }
"transact:plugin" = { path = "../../../system/Transact/plugin/wit/world.wit" }
"invite:plugin" = { path = "../../Invite/plugin/wit/world.wit" }
"evaluations:plugin" = { path = "../../Evaluations/plugin/wit/world.wit" }
"accounts:plugin" = { path = "../../../system/Accounts/plugin/accounts/wit/world.wit" }
