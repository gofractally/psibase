[package]
name = "name-market-pkg"          # Crate name
description = "Premium name market"
version.workspace = true
rust-version.workspace = true
edition.workspace = true
repository.workspace = true
homepage.workspace = true
publish.workspace = true

[package.metadata.psibase]
package-name = "NameMarket"
services = ["name-market"]

[package.metadata.psibase.dependencies]
HttpServer = "0.23.0"
Sites = "0.23.0"
Host = "0.23.0"
Accounts = "0.23.0"
Permissions = "0.23.0"
Tokens = "0.23.0"
Nft = "0.23.0"
Transact = "0.23.0"
AuthSig = "0.23.0"

[lib]
crate-type = ["rlib"]

[dependencies]
name-market = { path = "service", version = "0.23.0" }
r-name-market = { path = "query-service", version = "0.23.0" }
name-market-plugin = { path = "plugin", version = "0.23.0" }
psibase-user-workspace-hack.workspace = true
