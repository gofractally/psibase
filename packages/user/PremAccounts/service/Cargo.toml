[package]
name = "prem-accounts"
version.workspace = true
rust-version.workspace = true
edition.workspace = true
publish.workspace = true

[package.metadata.psibase]
server = "r-prem-accts"
plugin = "prem-accounts-plugin"
data = [{ src = "../ui/dist", dst = "/" }]
postinstall = [
    { sender = "prem-accounts", service = "prem-accounts", method = "init", data = {} },
    { sender = "prem-accounts", service = "sites", method = "enablespa", data = { enable = true } },
    { sender = "prem-accounts", service = "prem-accounts", method = "create", data = { length = 1, initial_price = { value = 1000 }, target = 10, floor_price = { value = 100 }, increase_ppm = 50000, decrease_ppm = 50000 } },
    { sender = "prem-accounts", service = "prem-accounts", method = "create", data = { length = 2, initial_price = { value = 1000 }, target = 10, floor_price = { value = 100 }, increase_ppm = 50000, decrease_ppm = 50000 } },
    { sender = "prem-accounts", service = "prem-accounts", method = "create", data = { length = 3, initial_price = { value = 1000 }, target = 10, floor_price = { value = 100 }, increase_ppm = 50000, decrease_ppm = 50000 } },
