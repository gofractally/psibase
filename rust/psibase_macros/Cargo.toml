[package]
name = "psibase_macros_package"
version.workspace = true
rust-version.workspace = true
edition.workspace = true
repository.workspace = true
homepage.workspace = true

[workspace]
resolver = "2"
members = ["macro_core", "macro_derive"]

[workspace.package]
# name = "psibase_macros"
description = "Macros to support psibase development"
version = "0.1.0"
rust-version = "1.64.0"
edition = "2021"
repository = "https://github.com/gofractally/psibase"
homepage = "https://psibase.io"
license = "MIT"

[lib]
crate-type = ["rlib"]

[dependencies]
macro_derive = { path = "macro_derive" }
macro_core = { path = "macro_core" }
quote = "1.0.37"
syn = "2.0.77"
