[package]
name = "comp-a"
version = "0.1.0"
edition = "2021"

[dependencies]
wit-bindgen-rt = { version = "0.44.0", features = ["bitflags"] }

[lib]
crate-type = ["cdylib"]

[profile.release]
codegen-units = 1
opt-level = "s"
debug = false
strip = true
lto = true

[package.metadata.component]
package = "component:comp-a"

[package.metadata.component.target.dependencies]
"test:comp-b" = { path = "../comp-b/wit" }
"test:comp-c" = { path = "../comp-c/wit" }
